{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'images/instagram.jpg' %}">
    <meta charset="UTF-8">
    <title>Post App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 85%;
            max-width: 900px;
            margin: 40px auto;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1, h2 {
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            margin-right: 5px;
            transition: 0.3s;
        }

        .btn-primary { background: #4CAF50; }
        .btn-warning { background: #ff9800; }
        .btn-danger { background: #f44336; }
        .btn-secondary { background: #607d8b; }

        .btn:hover {
            opacity: 0.85;
        }

        /* FORM */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            font-weight: bold;
        }

        img {
            margin-top: 15px;
            border-radius: 12px;
            max-width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
